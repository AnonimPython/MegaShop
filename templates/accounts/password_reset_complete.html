{% extends 'base.html' %}
{% block title %}Password Changed — MegaShop{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                    <h4 class="mt-3">Password successfully changed!</h4>
                    <p class="text-muted">You can now login with your new password.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-dark">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
