{% extends 'base.html' %}
{% block title %}2FA Setup — MegaShop{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 text-center">
                    <h4 class="fw-bold mb-4">Two-Factor Authentication</h4>
                    <p class="text-muted mb-4">
                        Scan the QR code with <strong>Google Authenticator</strong>
                    </p>

                    <div class="mb-4 d-flex justify-content-center">
                        <div class="bg-white p-2 rounded border d-inline-block">
                            <img src="{{ qr_base64 }}" alt="QR Code" style="width: 220px; height: 220px;">
                        </div>
                    </div>

                    <p class="small text-muted">
                        Or enter the key manually:
                        <code class="d-block mt-1 p-2 bg-light rounded user-select-all">{{ secret }}</code>
                    </p>

                    <hr>
                    <h6 class="mb-3">Confirm setup</h6>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="code" class="form-control text-center form-control-lg"
                                   placeholder="6-digit code from app"
                                   maxlength="6" inputmode="numeric" pattern="[0-9]*"
                                   autocomplete="one-time-code" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">
                            <i class="bi bi-shield-check"></i> Confirm
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
