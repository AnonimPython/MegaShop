{% extends 'base.html' %}
{% block title %}Password Reset — MegaShop{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Password Reset</h3>
                    <p class="text-muted text-center">Enter your email and we'll send you a reset link</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">{{ form.email.label }}</label>
                            {{ form.email }}
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2">Send</button>
                    </form>
                    <p class="text-center mt-3 mb-0">
                        <a href="{% url 'accounts:login' %}">Remember your password?</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
